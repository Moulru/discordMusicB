<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Music Playlist</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B5%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // 2026-05-17: 색감 톤다운 — 부드러운 로즈 핑크, 따뜻한 회색 베이스 + 다크 모드 지원
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // GitHub Dark 톤
            ghd: { canvas: '#0d1117', overlay: '#161b22', subtle: '#1c2128', border: '#30363d', fg: '#c9d1d9', muted: '#8b949e' }
          },
          fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'] },
          boxShadow: { soft: '0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03)' }
        }
      }
    };
    // 다크 모드 캐시 적용 (FOUC 방지 — DOM 렌더 전 즉시 클래스 적용)
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #d6d3d1; }
    html.dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #30363d; }
    html.dark .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #484f58; }
    .toast-enter { animation: slideIn .25s ease-out; }
    .toast-leave { animation: slideOut .25s ease-in forwards; }
    @keyframes slideIn { from { transform: translateY(-12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideOut { to { transform: translateY(-12px); opacity: 0; } }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] .chev { transform: rotate(90deg); }
    .chev { transition: transform .2s; }
    .song-list > li + li { border-top: 1px solid #f5f5f4; }
    html.dark .song-list > li + li { border-top-color: #21262d; }
    html, body { transition: background-color .15s, color .15s; }
  </style>
</head>
<body class="bg-stone-50 dark:bg-ghd-canvas text-stone-800 dark:text-ghd-fg min-h-screen">

<!-- 로그인 화면 -->
<section id="login-view" class="hidden min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">♪</div>
      <h1 class="text-3xl font-bold text-pink-600 dark:text-pink-400">Music Playlist</h1>
    </div>
    <form id="login-form" class="bg-white dark:bg-ghd-overlay border border-stone-200/70 dark:border-ghd-border/70 rounded-2xl shadow-soft p-6 space-y-4">
      <label class="block">
        <span class="text-sm font-medium text-stone-600 dark:text-stone-300">공유 비밀번호</span>
        <input id="login-password" type="password" autocomplete="off" required
          class="mt-1.5 w-full px-3.5 py-2.5 bg-stone-50 dark:bg-ghd-canvas border border-stone-200 dark:border-ghd-border rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-300 dark:focus:ring-pink-700 focus:border-transparent transition">
      </label>
      <button type="submit"
        class="w-full bg-pink-500 hover:bg-pink-600 active:bg-pink-700 text-white font-medium py-2.5 rounded-xl transition shadow-sm">
        입 장
      </button>
      <p class="text-xs text-stone-400 dark:text-ghd-muted text-center pt-1">
        비번은 디스코드에서 ✏️ 플레이리스트 편집 버튼으로 확인
      </p>
      <p id="login-error" class="hidden text-xs text-red-500 dark:text-red-400 text-center"></p>
    </form>
  </div>
</section>

<!-- 메인 화면 -->
<section id="app-view" class="hidden max-w-3xl mx-auto px-4 sm:px-6 py-8">
  <header class="flex items-center justify-between mb-8">
    <a href="/" class="flex items-center gap-2.5 hover:opacity-70 transition" title="새로고침">
      <span class="text-3xl">♪</span>
      <h1 class="text-2xl sm:text-3xl font-bold text-pink-600 dark:text-pink-400">Music Playlist</h1>
    </a>
    <button id="theme-toggle" class="p-2 rounded-lg text-stone-500 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-ghd-overlay transition" title="다크 모드 전환" aria-label="다크 모드 전환">
      <!-- 라이트 모드일 때 달, 다크일 때 해 -->
      <svg class="dark:hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    </button>
  </header>

  <div class="flex justify-end mb-5">
    <button id="new-playlist-btn"
      class="inline-flex items-center gap-1.5 px-4 py-2 bg-pink-500 hover:bg-pink-600 text-white text-sm font-medium rounded-xl transition shadow-sm">
      <span class="text-lg leading-none">+</span> 새 플레이리스트
    </button>
  </div>

  <div id="playlists" class="space-y-3"></div>

  <!-- 2026-05-17: 휴지통 (3일 보관 후 영구 삭제, 복원 가능) -->
  <div id="trash-section" class="hidden mt-10 pt-6 border-t border-stone-200 dark:border-ghd-border">
    <div class="flex items-center gap-2 mb-3 text-stone-500 dark:text-stone-400">
      <span class="text-lg">🗑</span>
      <h2 class="text-sm font-semibold">휴지통</h2>
      <span id="trash-count" class="text-xs text-stone-400 dark:text-ghd-muted"></span>
      <span class="ml-auto text-xs text-stone-400 dark:text-ghd-muted">3일 후 영구 삭제</span>
    </div>
    <div id="trash-items" class="space-y-2"></div>
  </div>
</section>

<!-- 토스트 -->
<div id="toasts" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

<!-- 모달: 새 플레이리스트 -->
<div id="modal-new" class="hidden fixed inset-0 bg-stone-900/40 dark:bg-black/60 z-40 flex items-center justify-center px-4">
  <div class="bg-white dark:bg-ghd-overlay rounded-2xl shadow-xl w-full max-w-sm p-6">
    <h3 class="text-lg font-semibold text-stone-800 dark:text-ghd-fg mb-4">새 플레이리스트</h3>
    <label class="block mb-5">
      <span class="text-sm text-stone-500 dark:text-stone-400">이름 (<span class="font-mono">!playlist</span> 뒤에 올 식별자, 영문/숫자/_/-)</span>
      <input id="new-id" type="text" placeholder="예: bgm"
        class="mt-1 w-full px-3 py-2 bg-stone-50 dark:bg-ghd-canvas border border-stone-200 dark:border-ghd-border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300 dark:focus:ring-pink-700 transition">
    </label>
    <div class="flex gap-2 justify-end">
      <button class="modal-close px-4 py-2 text-sm text-stone-600 dark:text-stone-300 hover:bg-stone-100 dark:hover:bg-ghd-subtle rounded-lg transition">취소</button>
      <button id="new-confirm" class="px-4 py-2 text-sm bg-pink-500 hover:bg-pink-600 text-white rounded-lg transition shadow-sm">만들기</button>
    </div>
  </div>
</div>

<script>
const POLL_INTERVAL_MS = 25_000;
const TITLE_MAX_LEN = 30;
const MAX_SONGS_PER_PLAYLIST = 100;
let state = { authenticated: false, data: null, globalVersion: 0, pollTimer: null };

// ──────────────────────────────────────────────
// 유틸
// ──────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const colors = {
    ok:   'bg-emerald-500',
    err:  'bg-red-500',
    info: 'bg-pink-500',
  };
  const div = document.createElement('div');
  div.className = `toast-enter pointer-events-auto ${colors[type] || colors.ok} text-white text-sm px-4 py-2.5 rounded-xl shadow-lg`;
  div.textContent = msg;
  document.getElementById('toasts').appendChild(div);
  setTimeout(() => { div.classList.remove('toast-enter'); div.classList.add('toast-leave'); }, 2500);
  setTimeout(() => div.remove(), 2800);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function videoIdFrom(url) {
  const m = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  return m ? m[1] : null;
}

function shortenTitle(s) {
  if (!s) return '';
  return s.length > TITLE_MAX_LEN ? s.slice(0, TITLE_MAX_LEN) + '…' : s;
}

// 노래 제목 표시: note(메모) > title(자동fetch) > "(제목 없음)"
function songDisplayTitle(s) {
  return s.note || s.title || '(제목 없음)';
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
  if (res.status === 401) {
    showLogin();
    throw new Error('Not logged in');
  }
  if (res.status === 304) return { notModified: true };
  if (!res.ok) {
    let msg = `Error ${res.status}`;
    try { msg = (await res.json()).error || msg; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

// ──────────────────────────────────────────────
// 화면 전환
// ──────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-view').classList.remove('hidden');
  document.getElementById('login-view').classList.add('flex');
  document.getElementById('app-view').classList.add('hidden');
  state.authenticated = false;
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
}

function showApp() {
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('login-view').classList.remove('flex');
  document.getElementById('app-view').classList.remove('hidden');
  state.authenticated = true;
  startPolling();
}

// ──────────────────────────────────────────────
// 데이터 로드 + 렌더
// ──────────────────────────────────────────────
async function loadData(silent = false) {
  try {
    const since = silent ? `?since=${state.globalVersion}` : '';
    const data = await api('/api/playlists' + since);
    if (data.notModified) {
      // 활성은 304여도 휴지통은 갱신 (남은 시간 갱신용)
      loadTrash();
      return;
    }
    state.data = data;
    state.globalVersion = data.global_version || 0;
    render();
    loadTrash();
    if (silent) toast('🔄 누군가 플레이리스트를 수정했어요', 'info');
  } catch (e) {
    if (!silent) toast(e.message, 'err');
  }
}

async function loadTrash() {
  try {
    const data = await api('/api/trash');
    renderTrash(data.trash || []);
  } catch {}
}

function startPolling() {
  if (state.pollTimer) clearInterval(state.pollTimer);
  loadData(false);
  state.pollTimer = setInterval(() => {
    if (document.hidden) return;
    loadData(true);
  }, POLL_INTERVAL_MS);
}

function render() {
  if (!state.data) return;
  const root = document.getElementById('playlists');
  // 2026-05-17: 곡 추가/삭제 후 re-render 시 펼쳐진 카드 상태 유지
  const openPls = new Set(
    Array.from(root.querySelectorAll('[data-pl-card] details[open]'))
      .map(d => d.closest('[data-pl-card]')?.dataset.plCard)
      .filter(Boolean)
  );
  if (!state.data.playlists.length) {
    root.innerHTML = `<div class="text-center text-stone-400 dark:text-ghd-muted py-12">아직 플레이리스트가 없어요</div>`;
    return;
  }
  root.innerHTML = state.data.playlists.map(renderPlaylist).join('');
  for (const plId of openPls) {
    const card = root.querySelector(`[data-pl-card="${CSS.escape(plId)}"]`);
    const details = card && card.querySelector('details');
    if (details) details.open = true;
  }
  attachPlaylistHandlers();
}

// 2026-05-17: Lucide 스타일 모던 SVG 아이콘
const TRASH_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`;
const PENCIL_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>`;
const RESTORE_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;

function remainingText(expiresAt) {
  const sec = expiresAt - Math.floor(Date.now() / 1000);
  if (sec <= 0) return '곧 영구삭제';
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  if (d > 0) return `${d}일 ${h}시간 후 영구삭제`;
  const m = Math.floor((sec % 3600) / 60);
  if (h > 0) return `${h}시간 ${m}분 후 영구삭제`;
  return `${m}분 후 영구삭제`;
}

function renderTrash(items) {
  const section = document.getElementById('trash-section');
  const countEl = document.getElementById('trash-count');
  const root = document.getElementById('trash-items');
  if (!items || items.length === 0) {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');
  countEl.textContent = `(${items.length})`;
  root.innerHTML = items.map(t => `
    <div class="flex items-center gap-2 px-4 py-2.5 bg-stone-100/60 dark:bg-ghd-subtle/60 border border-stone-200/60 dark:border-ghd-border/60 rounded-lg text-sm">
      <span class="font-mono text-stone-500 dark:text-stone-400">!playlist</span>
      <span class="font-semibold text-stone-700 dark:text-ghd-fg truncate">${escapeHtml(t.id)}</span>
      <span class="text-xs text-stone-400 dark:text-ghd-muted tabular-nums">${t.song_count}곡</span>
      <span class="ml-auto text-xs text-stone-400 dark:text-ghd-muted">${escapeHtml(remainingText(t.expires_at))}</span>
      <button data-act="restore" data-pl="${escapeHtml(t.id)}"
        class="inline-flex items-center gap-1 px-2.5 py-1 bg-white dark:bg-ghd-overlay hover:bg-pink-50 dark:hover:bg-pink-900/20 border border-stone-200 dark:border-ghd-border hover:border-pink-200 dark:border-pink-800/50 text-stone-600 dark:text-stone-300 hover:text-pink-600 dark:text-pink-400 text-xs font-medium rounded-md transition" title="복원">
        ${RESTORE_ICON} <span>복원</span>
      </button>
    </div>
  `).join('');
  // 복원 핸들러
  root.querySelectorAll('[data-act="restore"]').forEach(btn => {
    btn.onclick = async (e) => {
      e.preventDefault();
      const plId = btn.dataset.pl;
      try {
        const res = await api(`/api/playlists/${encodeURIComponent(plId)}/restore`, { method: 'POST' });
        if (res.renamed) {
          toast(`복원 완료 (이름 충돌로 '${res.id}'로 복원됨)`);
        } else {
          toast(`복원 완료: !playlist ${res.id}`);
        }
        loadData(false);
      } catch (e) { toast(e.message, 'err'); }
    };
  });
}

function renderPlaylist(pl) {
  const isFull = pl.songs.length >= MAX_SONGS_PER_PLAYLIST;
  const countColor = isFull ? 'text-red-500 dark:text-red-400 font-medium' : 'text-stone-400 dark:text-ghd-muted';
  const songs = pl.songs.map((s, i) => {
    const titleText = shortenTitle(songDisplayTitle(s));
    return `
      <li class="flex items-start gap-3 py-2.5 px-3 hover:bg-stone-50 dark:hover:bg-ghd-canvas transition rounded group">
        <span class="text-xs text-stone-300 dark:text-stone-600 w-7 text-right shrink-0 pt-0.5 tabular-nums">${i + 1}.</span>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-stone-700 dark:text-ghd-fg truncate" title="${escapeHtml(songDisplayTitle(s))}">${escapeHtml(titleText)}</div>
          <a href="${escapeHtml(s.url)}" target="_blank" rel="noopener noreferrer"
            class="text-xs text-stone-400 dark:text-ghd-muted hover:text-pink-500 dark:hover:text-pink-400 truncate block mt-0.5 transition">${escapeHtml(s.url)}</a>
        </div>
        <button data-act="del-song" data-pl="${escapeHtml(pl.id)}" data-song="${s.id}" data-ver="${pl.version}"
          class="opacity-0 group-hover:opacity-100 text-stone-400 dark:text-ghd-muted hover:text-red-500 dark:text-red-400 p-1.5 rounded-md hover:bg-red-50 dark:hover:bg-red-900/30 transition shrink-0" title="곡 삭제" aria-label="곡 삭제">${TRASH_ICON}</button>
      </li>
    `;
  }).join('');

  // 2026-05-17: 헤더 표시를 "!playlist <id>" 명령어 그대로. 편집 시 id 부분만 수정.
  return `
    <div class="bg-white dark:bg-ghd-overlay border border-stone-200/70 dark:border-ghd-border/70 rounded-2xl shadow-soft overflow-hidden" data-pl-card="${escapeHtml(pl.id)}">
      <details>
        <summary class="flex items-center gap-2 px-5 py-3.5 hover:bg-stone-50 dark:hover:bg-ghd-canvas transition">
          <span class="chev text-stone-400 dark:text-ghd-muted text-xs">▶</span>
          <span class="font-mono text-stone-500 dark:text-stone-400 text-sm">!playlist</span>
          <span class="font-semibold text-stone-800 dark:text-ghd-fg truncate font-mono">${escapeHtml(pl.id)}</span>
          <span class="ml-auto flex items-center gap-1 shrink-0">
            <span class="text-xs ${countColor} mr-2 tabular-nums">${pl.songs.length}/${MAX_SONGS_PER_PLAYLIST}</span>
            <button data-act="rename" data-pl="${escapeHtml(pl.id)}" data-ver="${pl.version}"
              class="text-stone-400 dark:text-ghd-muted hover:text-pink-600 dark:text-pink-400 p-1.5 rounded-md hover:bg-pink-50 dark:hover:bg-pink-900/20 transition" title="이름 변경" aria-label="이름 변경">${PENCIL_ICON}</button>
            <button data-act="del-pl" data-pl="${escapeHtml(pl.id)}"
              class="text-stone-400 dark:text-ghd-muted hover:text-red-500 dark:text-red-400 p-1.5 rounded-md hover:bg-red-50 dark:hover:bg-red-900/30 transition" title="플레이리스트 삭제" aria-label="플레이리스트 삭제">${TRASH_ICON}</button>
          </span>
        </summary>
        <ul class="song-list px-2 py-2 max-h-[28rem] overflow-y-auto scrollbar-thin border-t border-stone-100 dark:border-ghd-border/50">${songs || '<li class="text-sm text-stone-400 dark:text-ghd-muted py-4 px-3">아직 곡이 없어요</li>'}</ul>
        <form class="px-5 py-3.5 border-t border-stone-100 dark:border-ghd-border/50 flex gap-2 bg-stone-50/40 dark:bg-ghd-subtle/40" data-act="add-song" data-pl="${escapeHtml(pl.id)}" data-ver="${pl.version}">
          <input type="url" name="url" placeholder="${isFull ? `곡이 ${MAX_SONGS_PER_PLAYLIST}개로 가득 찼어요 (삭제 후 추가 가능)` : '🔗 YouTube URL'}" ${isFull ? 'disabled' : 'required'}
            class="flex-1 min-w-0 px-3 py-2 text-sm bg-white dark:bg-ghd-overlay border border-stone-200 dark:border-ghd-border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300 dark:focus:ring-pink-700 transition disabled:bg-stone-100 dark:bg-ghd-subtle disabled:cursor-not-allowed disabled:text-stone-400 dark:text-ghd-muted">
          <button type="submit" ${isFull ? 'disabled' : ''} class="px-4 py-2 bg-white dark:bg-ghd-overlay border border-pink-300 dark:border-pink-700/50 hover:bg-pink-50 dark:hover:bg-pink-900/20 text-pink-600 dark:text-pink-400 text-sm font-medium rounded-lg transition disabled:bg-stone-100 dark:bg-ghd-subtle disabled:text-stone-400 dark:text-ghd-muted disabled:border-stone-200 dark:border-ghd-border disabled:cursor-not-allowed">
            + 추가
          </button>
        </form>
      </details>
      <div class="border-t border-stone-100 dark:border-ghd-border/50 px-5 py-3 bg-stone-50/50 dark:bg-ghd-subtle/50 flex flex-wrap items-center gap-3">
        <label class="inline-flex items-center gap-2 text-sm text-stone-600 dark:text-stone-300 cursor-pointer select-none">
          <input type="checkbox" data-act="shuffle-toggle" data-pl="${escapeHtml(pl.id)}" class="rounded text-pink-500 focus:ring-pink-300 dark:focus:ring-pink-700 border-stone-300 dark:border-ghd-border">
          <span>랜덤 재생</span>
        </label>
        <button data-act="copy" data-pl="${escapeHtml(pl.id)}"
          class="ml-auto inline-flex items-center gap-1.5 px-3.5 py-1.5 bg-pink-50 dark:bg-pink-900/20 hover:bg-pink-100 dark:hover:bg-pink-900/30 text-pink-700 dark:text-pink-300 border border-pink-200 dark:border-pink-800/50 text-sm font-medium rounded-lg transition">
          📋 재생 명령 복사
        </button>
      </div>
    </div>
  `;
}

function attachPlaylistHandlers() {
  document.querySelectorAll('[data-act="copy"]').forEach(btn => {
    btn.onclick = async (e) => {
      e.preventDefault();
      const plId = btn.dataset.pl;
      const card = btn.closest('[data-pl-card]');
      const shuffled = card.querySelector('[data-act="shuffle-toggle"]').checked;
      const cmd = shuffled ? `!playlist ${plId} shuffle` : `!playlist ${plId}`;
      try {
        await navigator.clipboard.writeText(cmd);
        toast(`📋 복사됨: ${cmd}`);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = cmd; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove();
        toast(`📋 복사됨: ${cmd}`);
      }
    };
  });

  // 2026-05-17: 이름 변경 = ID 변경 (!playlist <id>의 id 부분). songs.playlist_id도 cascade 갱신.
  document.querySelectorAll('[data-act="rename"]').forEach(btn => {
    btn.onclick = async (e) => {
      e.preventDefault();
      const plId = btn.dataset.pl;
      const version = parseInt(btn.dataset.ver, 10);
      const newId = prompt(`!playlist 뒤에 올 식별자를 입력 (영문/숫자/_/-, 1-32자)\n현재: ${plId}`, plId);
      if (!newId || newId === plId) return;
      if (!/^[A-Za-z0-9_-]{1,32}$/.test(newId)) {
        toast('영문/숫자/_/-만 사용 가능 (최대 32자)', 'err');
        return;
      }
      try {
        await api(`/api/playlists/${encodeURIComponent(plId)}`, {
          method: 'PATCH',
          body: JSON.stringify({ new_id: newId, version }),
        });
        toast(`이름 변경 완료: !playlist ${newId}`);
        loadData(false);
      } catch (e) {
        if (e.message.includes('Version conflict')) {
          toast('다른 사람이 먼저 수정했어요. 화면을 갱신할게요', 'err');
          loadData(false);
        } else toast(e.message, 'err');
      }
    };
  });

  document.querySelectorAll('[data-act="del-pl"]').forEach(btn => {
    btn.onclick = async (e) => {
      e.preventDefault();
      const plId = btn.dataset.pl;
      if (!confirm(`'${plId}'을(를) 휴지통으로 이동할까요?\n(3일 후 영구삭제, 그 전엔 휴지통에서 복원 가능)`)) return;
      try {
        await api(`/api/playlists/${encodeURIComponent(plId)}`, { method: 'DELETE' });
        toast('🗑 휴지통으로 이동됨 (3일 후 영구삭제)');
        loadData(false);
      } catch (e) { toast(e.message, 'err'); }
    };
  });

  document.querySelectorAll('[data-act="del-song"]').forEach(btn => {
    btn.onclick = async (e) => {
      e.preventDefault();
      const { pl, song, ver } = btn.dataset;
      try {
        await api(`/api/playlists/${encodeURIComponent(pl)}/songs/${song}?version=${ver}`, { method: 'DELETE' });
        toast('곡 삭제됨');
        loadData(false);
      } catch (e) {
        if (e.message.includes('Version conflict')) {
          toast('다른 사람이 먼저 수정했어요. 화면을 갱신할게요', 'err');
          loadData(false);
        } else toast(e.message, 'err');
      }
    };
  });

  document.querySelectorAll('form[data-act="add-song"]').forEach(form => {
    form.onsubmit = async (e) => {
      e.preventDefault();
      const plId = form.dataset.pl;
      const version = parseInt(form.dataset.ver, 10);
      const url = form.url.value.trim();
      if (!url) return;
      try {
        await api(`/api/playlists/${encodeURIComponent(plId)}/songs`, {
          method: 'POST',
          body: JSON.stringify({ url, version }),
        });
        toast('곡 추가됨');
        form.reset();
        loadData(false);
      } catch (e) {
        if (e.message.includes('Version conflict')) {
          toast('다른 사람이 먼저 수정했어요. 화면을 갱신할게요', 'err');
          loadData(false);
        } else toast(e.message, 'err');
      }
    };
  });
}

// ──────────────────────────────────────────────
// 새 플레이리스트 모달
// ──────────────────────────────────────────────
function openNewModal() {
  document.getElementById('modal-new').classList.remove('hidden');
  document.getElementById('new-id').value = '';
  setTimeout(() => document.getElementById('new-id').focus(), 50);
}
function closeNewModal() {
  document.getElementById('modal-new').classList.add('hidden');
}

document.getElementById('new-playlist-btn').onclick = openNewModal;
document.querySelectorAll('.modal-close').forEach(b => b.onclick = closeNewModal);
document.getElementById('modal-new').onclick = (e) => {
  if (e.target.id === 'modal-new') closeNewModal();
};
document.getElementById('new-confirm').onclick = async () => {
  const id = document.getElementById('new-id').value.trim();
  if (!id) { toast('이름을 입력해주세요', 'err'); return; }
  if (!/^[A-Za-z0-9_-]{1,32}$/.test(id)) {
    toast('영문/숫자/_/-만 사용 가능 (최대 32자)', 'err');
    return;
  }
  try {
    // id가 곧 명령어 식별자 = 표시 이름 (name도 동일 값으로 전송)
    await api('/api/playlists', { method: 'POST', body: JSON.stringify({ id, name: id }) });
    toast(`새 플레이리스트 생성: !playlist ${id}`);
    closeNewModal();
    loadData(false);
  } catch (e) { toast(e.message, 'err'); }
};

// ──────────────────────────────────────────────
// 로그인 / 로그아웃
// ──────────────────────────────────────────────
document.getElementById('login-form').onsubmit = async (e) => {
  e.preventDefault();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      errEl.textContent = body.error || '로그인 실패';
      errEl.classList.remove('hidden');
      return;
    }
    document.getElementById('login-password').value = '';
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
};

// 2026-05-17: 다크 모드 토글 (캐시: localStorage 'theme' = 'dark' | 'light', 기본 라이트)
document.getElementById('theme-toggle').onclick = () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
};

// ──────────────────────────────────────────────
// 초기화: 세션 검증
// ──────────────────────────────────────────────
(async function init() {
  try {
    const res = await fetch('/api/auth/status', { credentials: 'same-origin' });
    const j = await res.json();
    if (j.authenticated) showApp();
    else showLogin();
  } catch {
    showLogin();
  }
})();
</script>
